steps:
  # 1. Docker 이미지 빌드
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"
      - "."

  # 2. 이미지 Push
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"

  # 3. Cloud Run 배포
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "apis-data-spcdeinfoservice"
      - "--image"
      - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"
      - "--region"
      - "asia-northeast3"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-secrets"
      - "DATAGOKR_SERVICEKEY=DATAGOKR_SERVICEKEY:latest,AUTH_API_KEY=AUTH_API_KEY:latest"
      - "--memory"
      - "256Mi"
      - "--cpu"
      - "1"
      - "--concurrency"
      - "200"
      - "--max-instances"
      - "10"
      - "--timeout"
      - "30s"

  # 4. 배포 검증
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        URL=$$(gcloud run services describe apis-data-spcdeinfoservice \
          --region=asia-northeast3 --platform=managed \
          --format='value(status.url)')
        echo "Checking $$URL/health"
        for i in 1 2 3 4 5; do
          STATUS=$$(curl -sf -o /dev/null -w "%{http_code}" "$$URL/health")
          if [ "$$STATUS" = "200" ]; then
            echo "Health check passed"
            exit 0
          fi
          echo "Attempt $$i: HTTP $$STATUS — retrying in 5s"
          sleep 5
        done
        echo "Health check failed after 5 attempts"
        exit 1

images:
  - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"
