steps:
  # 1. Docker 이미지 빌드
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"
      - "."

  # 2. 이미지 Push
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"

  # 3. Cloud Run 배포
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "apis-data-spcdeinfoservice"
      - "--image"
      - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"
      - "--region"
      - "asia-northeast3"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-secrets"
      - "DATAGOKR_SERVICEKEY=DATAGOKR_SERVICEKEY:latest,AUTH_API_KEY=AUTH_API_KEY:latest"
      - "--memory"
      - "256Mi"
      - "--cpu"
      - "1"
      - "--concurrency"
      - "200"
      - "--max-instances"
      - "10"
      - "--timeout"
      - "30s"
      - "--cpu-throttling"

images:
  - "asia-northeast3-docker.pkg.dev/workflow-knue/cloud-run-images/apis-data-spcdeinfoservice:$SHORT_SHA"
